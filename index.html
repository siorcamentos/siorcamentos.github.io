<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Construtor PRO · Acesso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#2563eb', 600: '#1d4ed8' },
                        accent: { 500: '#10b981', 600: '#059669' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, rgba(37, 99, 235, 0.15), transparent 50%), 
                              radial-gradient(circle at bottom, rgba(15, 23, 42, 1), #0f172a);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent; /* Remove brilho azul ao tocar no celular */
        }
        .app-container {
            min-height: 100dvh; /* Usa a altura real da tela no mobile */
        }
        .input-group { position: relative; }
        .input-icon {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); color: #64748b; font-size: 1.25rem;
        }
        .input-field {
            width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 1rem;
            background-color: #1e293b; border: 1px solid #334155; color: white;
            outline: none; transition: all 0.2s; font-size: 1rem;
        }
        .input-field:focus {
            border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); background-color: #0f172a;
        }
        .btn-primary {
            width: 100%; padding: 1rem; border-radius: 1rem; font-weight: 600; font-size: 1rem;
            color: white; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 0.5rem;
        }
        .btn-primary:active { transform: scale(0.98); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-slate-200 antialiased selection:bg-brand-500 selection:text-white">

<div class="app-container flex flex-col justify-center items-center p-6 mx-auto max-w-sm w-full relative">
    
    <div class="text-center mb-10 fade-in">
        <div class="w-20 h-20 bg-gradient-to-tr from-brand-600 to-blue-400 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-brand-500/30 mb-4">
            <i class="ph ph-hard-hat text-4xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-white mb-1">Construtor <span class="text-brand-500">PRO</span></h1>
        <p id="subtitulo" class="text-slate-400 text-sm font-medium">Faça login para continuar</p>
    </div>

    <div id="view-login" class="w-full fade-in">
        <form id="loginForm" class="space-y-4">
            <div class="input-group">
                <i class="ph ph-user input-icon"></i>
                <input id="nome" type="text" placeholder="Seu nome" required class="input-field">
            </div>
            <div class="input-group">
                <i class="ph ph-phone input-icon"></i>
                <input id="telefone" type="tel" placeholder="Seu telefone" required class="input-field">
            </div>
            <div class="input-group">
                <i class="ph ph-lock-key input-icon"></i>
                <input id="senha" type="password" placeholder="Sua senha" required class="input-field">
            </div>
            
            <div class="flex justify-end pt-1">
                <button type="button" onclick="mudarTela('recuperar')" class="text-sm font-medium text-brand-400 hover:text-brand-300">Esqueceu a senha?</button>
            </div>

            <button type="submit" class="btn-primary bg-brand-600 hover:bg-brand-500 shadow-lg shadow-brand-500/25 mt-2">
                Acessar Sistema
                <i class="ph ph-arrow-right text-lg"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-slate-400">
                Ainda não tem conta? 
                <button onclick="mudarTela('cadastro')" class="font-semibold text-white hover:text-brand-400 transition-colors">Criar agora</button>
            </p>
        </div>
    </div>

    <div id="view-cadastro" class="w-full fade-in hidden">
        <form id="cadastroForm" class="space-y-4">
            <div class="input-group">
                <i class="ph ph-user input-icon"></i>
                <input id="cad_nome" type="text" placeholder="Nome completo" required class="input-field focus:!border-accent-500 focus:!ring-accent-500/20">
            </div>
            <div class="input-group">
                <i class="ph ph-phone input-icon"></i>
                <input id="cad_telefone" type="tel" placeholder="Telefone (WhatsApp)" required class="input-field focus:!border-accent-500 focus:!ring-accent-500/20">
            </div>
            <div class="input-group">
                <i class="ph ph-lock-key input-icon"></i>
                <input id="cad_senha" type="password" placeholder="Crie uma senha forte" required class="input-field focus:!border-accent-500 focus:!ring-accent-500/20">
            </div>

            <button type="submit" class="btn-primary bg-accent-600 hover:bg-accent-500 shadow-lg shadow-accent-500/25 mt-6">
                Cadastrar Conta
                <i class="ph ph-check-circle text-lg"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <button onclick="mudarTela('login')" class="p-2 rounded-full bg-slate-800 text-slate-400 hover:text-white transition-colors">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>
    </div>

    <div id="view-recuperar" class="w-full fade-in hidden">
        <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700/50 mb-6 text-center">
            <i class="ph ph-whatsapp-logo text-4xl text-green-500 mb-2"></i>
            <p class="text-sm text-slate-300">Informe seus dados para solicitar a redefinição de senha diretamente pelo nosso suporte no WhatsApp.</p>
        </div>

        <div class="space-y-4">
            <div class="input-group">
                <i class="ph ph-user input-icon"></i>
                <input id="rec_nome" type="text" placeholder="Seu Nome" class="input-field">
            </div>
            <div class="input-group">
                <i class="ph ph-phone input-icon"></i>
                <input id="rec_telefone" type="tel" placeholder="Seu Telefone" class="input-field">
            </div>
            
            <button onclick="enviarSolicitacaoWhats()" class="btn-primary bg-green-600 hover:bg-green-500 shadow-lg shadow-green-500/25 mt-2">
                Solicitar via WhatsApp
            </button>
        </div>

        <div class="mt-8 text-center">
            <button onclick="mudarTela('login')" class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center justify-center gap-2 mx-auto">
                <i class="ph ph-arrow-left"></i> Voltar ao login
            </button>
        </div>
    </div>

    <div id="msg-container" class="absolute bottom-6 left-6 right-6 bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl text-sm text-center flex items-center justify-center gap-2 hidden fade-in">
        <i class="ph ph-warning-circle text-lg"></i>
        <span id="msg"></span>
    </div>

</div>

<script>
    function mostrarErro(mensagem) {
        const container = document.getElementById('msg-container');
        document.getElementById('msg').innerText = mensagem;
        container.classList.remove('hidden');
        setTimeout(() => container.classList.add('hidden'), 5000); // Esconde após 5s
    }

    window.mudarTela = function(tela) {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-cadastro').classList.add('hidden');
        document.getElementById('view-recuperar').classList.add('hidden');
        document.getElementById('msg-container').classList.add('hidden');

        const subtitulo = document.getElementById('subtitulo');
        if (tela === 'login') {
            document.getElementById('view-login').classList.remove('hidden');
            subtitulo.innerText = "Faça login para continuar";
        } else if (tela === 'cadastro') {
            document.getElementById('view-cadastro').classList.remove('hidden');
            subtitulo.innerText = "Crie sua conta profissional";
        } else if (tela === 'recuperar') {
            document.getElementById('view-recuperar').classList.remove('hidden');
            subtitulo.innerText = "Recuperação de Acesso";
        }
    };

    const SUPABASE_URL = "https://jbrkmuduyaibduwopxqn.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_TUL_4vjHuNL6O4KBUpOGrA_kh8ZmJJ4"; 

    let supabaseClient;
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (error) {
        mostrarErro('Erro de conexão com o servidor.');
    }

    async function hashSenha(senha) {
        const encoder = new TextEncoder();
        const data = encoder.encode(senha);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Acessando...';
        btn.disabled = true;

        if (!supabaseClient) {
            mostrarErro("Sistema indisponível no momento.");
            btn.innerHTML = originalText; btn.disabled = false;
            return;
        }

        const nome = document.getElementById("nome").value.trim();
        const telefone = document.getElementById("telefone").value.trim();
        const senhaHash = await hashSenha(document.getElementById("senha").value);

        const { data: usuario, error } = await supabaseClient
            .from("usuarios")
            .select("*")
            .eq("nome", nome)
            .eq("telefone", telefone) // Correção aplicada aqui! (Faltava o ponto)
            .maybeSingle();

        if (error || !usuario) {
            mostrarErro("Usuário não encontrado!");
            btn.innerHTML = originalText; btn.disabled = false;
            return;
        }
        if (usuario.senha !== senhaHash) {
            mostrarErro("Senha incorreta!");
            btn.innerHTML = originalText; btn.disabled = false;
            return;
        }

        localStorage.setItem("user_id", usuario.id);
        window.location.href = "orcamento/index.html";
    });

    document.getElementById("cadastroForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Cadastrando...';
        btn.disabled = true;

        if (!supabaseClient) {
            mostrarErro("Sistema indisponível.");
            btn.innerHTML = originalText; btn.disabled = false;
            return;
        }

        const nome = document.getElementById("cad_nome").value.trim();
        const telefone = document.getElementById("cad_telefone").value.trim();
        const senhaHash = await hashSenha(document.getElementById("cad_senha").value);

        const { data: existente, error: erroConsulta } = await supabaseClient
            .from("usuarios")
            .select("id")
            .eq("nome", nome)
            .eq("telefone", telefone)
            .maybeSingle();

        if (existente) {
            mostrarErro("Este usuário já possui cadastro.");
            btn.innerHTML = originalText; btn.disabled = false;
            return;
        }

        const { data, error } = await supabaseClient
            .from("usuarios")
            .insert([{ nome, telefone: telefone, senha: senhaHash, created_at: new Date() }])
            .select()
            .single();

        if (error) {
            mostrarErro("Falha ao criar conta.");
            btn.innerHTML = originalText; btn.disabled = false;
            return;
        }

        localStorage.setItem("user_id", data.id);
        window.location.href = "orcamento/index.html";
    });

    function enviarSolicitacaoWhats() {
        const nome = document.getElementById("rec_nome").value.trim() || "Não informado";
        const telefone = document.getElementById("rec_telefone").value.trim() || "Não informado";
        const mensagem = `Olá, gostaria de solicitar a alteração da minha senha.\n\n*Nome:* ${nome}\n*Telefone:* ${telefone}`;
        const numeroWhatsApp = "5581989895620";
        window.open(`https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensagem)}`, "_blank");
    }
</script>
</body>
</html>
