<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Construtor PRO · Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#2563eb', 600: '#1d4ed8' } }
                }
            }
        }
    </script>
    <style>
        body { background: #0f172a; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1.25rem; }
        .action-btn { transition: .2s; }
        .action-btn:active { transform: scale(.95); }
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen pb-20">

<header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-tr from-brand-600 to-blue-400 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30">
            <i class="ph-fill ph-hard-hat text-xl text-white"></i>
        </div>
        <div>
            <h1 class="font-bold text-white leading-tight">Construtor PRO</h1>
            <div class="flex items-center gap-2 mt-0.5">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Painel</p>
                <span class="text-slate-600">•</span>
                <span id="sync-status" class="text-[10px] font-semibold text-brand-400 flex items-center gap-1">
                    <i class="ph ph-arrows-clockwise animate-spin"></i> Conectando...
                </span>
            </div>
        </div>
    </div>
    <button onclick="sair()" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white">
        <i class="ph ph-sign-out text-xl"></i>
    </button>
</header>

<main class="p-5 max-w-md mx-auto space-y-8">

    <!-- Ações Rápidas (inalterado) -->
    <section>
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Ações Rápidas</h2>
        <div class="grid grid-cols-2 gap-4">
            <a href="orcamento-alvenaria.html" class="action-btn card p-4 flex flex-col items-center gap-3 hover:bg-slate-800">
                <div class="w-14 h-14 rounded-full bg-orange-500/10 text-orange-500 flex items-center justify-center"><i class="ph-fill ph-wall text-3xl"></i></div>
                <span class="font-semibold text-sm">Alvenaria</span>
            </a>
            <a href="orcamento-pintura.html" class="action-btn card p-4 flex flex-col items-center gap-3 hover:bg-slate-800">
                <div class="w-14 h-14 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center"><i class="ph-fill ph-paint-roller text-3xl"></i></div>
                <span class="font-semibold text-sm">Pintura</span>
            </a>
            <a href="orcamento-revestimento.html" class="action-btn card p-4 flex flex-col items-center gap-3 hover:bg-slate-800">
                <div class="w-14 h-14 rounded-full bg-indigo-500/10 text-indigo-400 flex items-center justify-center"><i class="ph-fill ph-squares-four text-3xl"></i></div>
                <span class="font-semibold text-sm">Revestimento</span>
            </a>
            <a href="orcamento-modelo.html" class="action-btn card p-4 flex flex-col items-center gap-3 hover:bg-slate-800">
                <div class="w-14 h-14 rounded-full bg-emerald-500/10 text-emerald-400 flex items-center justify-center"><i class="ph-fill ph-file-text text-3xl"></i></div>
                <span class="font-semibold text-sm text-emerald-400">Modelo Livre</span>
            </a>
            <a href="assistente.html" class="action-btn card p-4 flex flex-col items-center gap-3 hover:bg-slate-800 border border-purple-500/30 bg-purple-500/5">
                <div class="w-14 h-14 rounded-full bg-purple-500/10 text-purple-400 flex items-center justify-center"><i class="ph-fill ph-robot text-3xl"></i></div>
                <span class="font-semibold text-sm text-purple-400">Assistente</span>
            </a>
        </div>
    </section>

    <!-- Resumo Financeiro com lista de orçamentos -->
    <section>
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Resumo Financeiro</h2>
        <div class="card overflow-hidden">
            <div id="lista-resumo"></div> <!-- Itens serão inseridos aqui -->
            <div class="p-5 bg-gradient-to-r from-brand-600/20 to-transparent flex justify-between items-center">
                <div><p class="text-xs font-bold text-brand-400 uppercase tracking-widest">Total Geral</p></div>
                <div class="text-right"><p id="valor-geral" class="text-2xl font-black text-white">R$ 0,00</p></div>
            </div>
        </div>
    </section>

    <!-- Link para Termos e botão Seja PRO -->
    <div class="text-center mt-8">
        <a href="termos.html" class="text-xs text-slate-500 hover:text-brand-400 underline">Termos e Condições</a>
    </div>
    <div class="text-center mt-4">
        <button onclick="contatarWhatsApp()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-green-600/30 transition-all active:scale-95">
            Seja PRO
        </button>
    </div>

</main>

<script>
    const SUPABASE_URL = "https://jbrkmuduyaibduwopxqn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_TUL_4vjHuNL6O4KBUpOGrA_kh8ZmJJ4";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const userId = localStorage.getItem("user_id");
    const planoUsuario = localStorage.getItem("plano") || "free";

    if (!userId) {
        window.location.href = "../index.html";
    }

    let usuarioNome = '';
    let usuarioTelefone = '';

    async function carregarDadosUsuario() {
        if (!userId) return;
        const { data, error } = await supabaseClient
            .from('usuarios')
            .select('nome, telefone')
            .eq('id', userId)
            .single();
        if (!error && data) {
            usuarioNome = data.nome || '';
            usuarioTelefone = data.telefone || '';
        }
    }

    async function verificarLimite(modulo) {
        const { count } = await supabaseClient
            .from("orcamentos")
            .select("*", { count: "exact", head: true })
            .eq("user_id", userId)
            .eq("tipo", modulo);
        if (planoUsuario === "free" && count >= 1) {
            alert("Plano FREE permite apenas 1 orçamento por módulo.");
            return false;
        }
        if (planoUsuario === "pro" && count >= 4) {
            alert("Plano PRO permite até 4 orçamentos por módulo.");
            return false;
        }
        return true;
    }

    async function sincronizarNuvem() {
        const modulos = ['alvenaria', 'revestimento', 'pintura', 'modelo'];
        for (const modulo of modulos) {
            const dadosRaw = localStorage.getItem("orcamento_" + modulo);
            if (!dadosRaw) continue;
            const dados = JSON.parse(dadosRaw);
            if (!dados || Object.keys(dados).length === 0) continue;
            const titulo = dados.cliente || "Orçamento " + modulo;
            const idLocal = localStorage.getItem("orcamento_id_" + modulo);
            if (idLocal) {
                await supabaseClient
                    .from("orcamentos")
                    .update({ titulo, dados, updated_at: new Date() })
                    .eq("id", idLocal);
            } else {
                if (!(await verificarLimite(modulo))) continue;
                const { data } = await supabaseClient
                    .from("orcamentos")
                    .insert([{ user_id: userId, tipo: modulo, titulo, dados }])
                    .select()
                    .single();
                if (data) {
                    localStorage.setItem("orcamento_id_" + modulo, data.id);
                }
            }
        }

        const { data: orcamentosNuvem } = await supabaseClient
            .from("orcamentos")
            .select("*")
            .eq("user_id", userId);
        if (orcamentosNuvem) {
            orcamentosNuvem.forEach(orc => {
                if (!localStorage.getItem("orcamento_" + orc.tipo)) {
                    localStorage.setItem("orcamento_" + orc.tipo, JSON.stringify(orc.dados));
                    localStorage.setItem("orcamento_id_" + orc.tipo, orc.id);
                }
            });
        }

        carregarEMontar();

        const syncStatus = document.getElementById("sync-status");
        if (syncStatus) {
            syncStatus.innerHTML = '<i class="ph ph-cloud-check text-emerald-400"></i> Sincronizado';
        }
    }

    function carregarEMontar() {
        const modulos = ['alvenaria', 'revestimento', 'pintura', 'modelo'];
        let totalGeral = 0;
        const listaResumo = document.getElementById('lista-resumo');
        if (listaResumo) listaResumo.innerHTML = '';

        modulos.forEach(modulo => {
            const dadosRaw = localStorage.getItem("orcamento_" + modulo);
            if (!dadosRaw) return;
            const dados = JSON.parse(dadosRaw);
            let total = dados?.financial?.total || dados?.total || 0;
            totalGeral += Number(total);

            if (listaResumo) {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-4 border-b border-slate-800';
                item.innerHTML = `
                    <div>
                        <p class="font-bold text-white capitalize">${modulo}</p>
                        <p class="text-xs text-slate-400">R$ ${Number(total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="verOrcamento('${modulo}')" class="px-3 py-1 bg-brand-600/20 text-brand-400 rounded-lg text-xs font-bold">Ver</button>
                        <button onclick="excluirOrcamento('${modulo}')" class="px-3 py-1 bg-red-600/20 text-red-400 rounded-lg text-xs font-bold">Excluir</button>
                    </div>
                `;
                listaResumo.appendChild(item);
            }
        });

        const valorGeralEl = document.getElementById("valor-geral");
        if (valorGeralEl) {
            valorGeralEl.innerText = "R$ " + totalGeral.toLocaleString("pt-BR", { minimumFractionDigits: 2 });
        }
    }

 function verOrcamento(modulo) {
    window.location.href = `visualizacao.html?modulo=${modulo}`;
}

    async function excluirOrcamento(modulo) {
        if (!confirm("Excluir orçamento?")) return;
        localStorage.removeItem("orcamento_" + modulo);
        const id = localStorage.getItem("orcamento_id_" + modulo);
        if (id) {
            await supabaseClient.from("orcamentos").delete().eq("id", id);
        }
        location.reload(); // recarrega para atualizar lista
    }

    function sair() {
        if (confirm("Deseja sair do sistema?")) {
            localStorage.removeItem("user_id");
            window.location.href = "../index.html";
        }
    }

    function contatarWhatsApp() {
        const nome = encodeURIComponent(usuarioNome || 'Cliente');
        const telefone = encodeURIComponent(usuarioTelefone || '');
        const mensagem = encodeURIComponent(`Olá, gostaria de adquirir o plano PRO do sistema Construtor PRO. Meu nome: ${usuarioNome || ''}, telefone: ${usuarioTelefone || ''}.`);
        const url = `https://wa.me/5581989825613?text=${mensagem}`;
        window.open(url, '_blank');
    }

    window.onload = async function() {
        await carregarDadosUsuario();
        await sincronizarNuvem();
    };
</script>
</body>
</html>
