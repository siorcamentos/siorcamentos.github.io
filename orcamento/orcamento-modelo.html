<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Construtor PRO · Modelo Manual</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: { 
                brand: { 500: '#6366f1', 600: '#4f46e5' },
                slate: { 850: '#1e293b', 950: '#0f172a' }
            }
        }
    }
}
</script>

<style>

body{
background:#0f172a;
-webkit-tap-highlight-color:transparent;
}

.card-item{
background:#1e293b;
border:1px solid #334155;
border-radius:1.25rem;
}

.input-manual{
background:#0f172a;
border:1px solid #334155;
color:white;
border-radius:0.75rem;
padding:0.6rem 0.8rem;
font-size:0.875rem;
outline:none;
transition:all .2s;
}

.input-manual:focus{
border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,.2);
}

::-webkit-scrollbar{
width:0px;
}

</style>
</head>

<body class="text-slate-200 antialiased min-h-screen flex flex-col pb-32">

<header class="p-4 bg-slate-900 border-b border-slate-800 flex items-center justify-between sticky top-0 z-50">

<button onclick="window.location.href='index.html'" class="text-slate-500">
<i class="ph ph-house text-2xl"></i>
</button>

<div class="text-center">
<h1 class="text-xs font-black uppercase tracking-tighter text-indigo-400">
Construtor PRO
</h1>

<p class="text-[10px] text-slate-500 font-bold uppercase">
Orçamento Manual
</p>
</div>

<button onclick="limparTudo()" class="text-red-500/50">
<i class="ph ph-trash text-2xl"></i>
</button>

</header>

<main class="p-4 max-w-md mx-auto w-full space-y-6">

<section class="space-y-3">

<h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
Dados do Projeto
</h2>

<input type="text"
id="cliente-nome"
placeholder="Nome do Cliente ou Obra"
class="input-manual w-full font-bold">

<input type="date"
id="orcamento-data"
class="input-manual w-full">

</section>

<section>

<h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-3">
Itens do Orçamento
</h2>

<div id="lista-itens" class="space-y-4"></div>

</section>

<button onclick="adicionarItem()"
class="w-full py-4 border-2 border-dashed border-slate-700 rounded-2xl text-slate-500 font-bold text-xs flex items-center justify-center gap-2 hover:border-indigo-500 hover:text-indigo-400 transition-all">

<i class="ph ph-plus-circle text-lg"></i>
ADICIONAR NOVO ITEM

</button>

</main>

<footer class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 shadow-2xl z-50">

<div class="max-w-md mx-auto flex items-center justify-between gap-4">

<div>
<p class="text-[9px] font-black text-slate-500 uppercase">
Valor Total Estimado
</p>

<p id="valor-total"
class="text-xl font-black text-emerald-400">
R$ 0,00
</p>
</div>

<button onclick="salvarEVisualizar()"
class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2">

GERAR DOCUMENTO
<i class="ph ph-file-pdf text-lg"></i>

</button>

</div>

</footer>

<script>

let itens=[];

document.addEventListener("DOMContentLoaded",()=>{

const hoje=new Date().toISOString().split('T')[0];
const campoData=document.getElementById("orcamento-data");

if(campoData){
campoData.value=hoje;
}

adicionarItem();

});

function adicionarItem(){

const novoItem={
id:Date.now(),
tipo:"servico",
descricao:"",
qtd:1,
unid:"un",
valorUnit:0
};

itens.push(novoItem);

renderizarItens();

}

function removerItem(id){

itens=itens.filter(i=>i.id!==id);

renderizarItens();

}

function atualizarItem(id,campo,valor){

const item=itens.find(i=>i.id===id);

if(item){

item[campo]=valor;

}

calcularTotal();

}

function renderizarItens(){

const container=document.getElementById("lista-itens");

if(!container){
console.error("Elemento lista-itens não encontrado");
return;
}

container.innerHTML=itens.map(item=>{

const subtotal=item.qtd*item.valorUnit;

return `

<div class="card-item p-4 space-y-3 relative">

<button onclick="removerItem(${item.id})"
class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center shadow-lg">

<i class="ph ph-x text-xs"></i>

</button>

<div class="flex gap-2">

<select
onchange="atualizarItem(${item.id},'tipo',this.value)"
class="input-manual !text-[10px] font-bold uppercase !bg-slate-850">

<option value="servico" ${item.tipo==="servico"?"selected":""}>
Mão de Obra
</option>

<option value="material" ${item.tipo==="material"?"selected":""}>
Material
</option>

</select>

<input
type="text"
value="${item.descricao}"
oninput="atualizarItem(${item.id},'descricao',this.value)"
placeholder="Ex: Reboco de Parede"
class="input-manual flex-1">

</div>

<div class="grid grid-cols-3 gap-2">

<div>
<label class="text-[9px] font-bold text-slate-500 uppercase ml-1">
Qtd
</label>

<input
type="number"
value="${item.qtd}"
oninput="atualizarItem(${item.id},'qtd',parseFloat(this.value)||0)"
class="input-manual w-full">

</div>

<div>

<label class="text-[9px] font-bold text-slate-500 uppercase ml-1">
Unid
</label>

<input
type="text"
value="${item.unid}"
oninput="atualizarItem(${item.id},'unid',this.value)"
class="input-manual w-full text-center uppercase">

</div>

<div>

<label class="text-[9px] font-bold text-slate-500 uppercase ml-1">
V. Unit (R$)
</label>

<input
type="number"
value="${item.valorUnit}"
oninput="atualizarItem(${item.id},'valorUnit',parseFloat(this.value)||0)"
class="input-manual w-full">

</div>

</div>

<div class="text-right">

<p class="text-[9px] text-slate-500 uppercase font-bold">
Subtotal
</p>

<p class="font-bold text-emerald-400">
${subtotal.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
</p>

</div>

</div>

`;

}).join("");

calcularTotal();

}

function calcularTotal(){

const total=itens.reduce((acc,i)=>acc+(i.qtd*i.valorUnit),0);

const campo=document.getElementById("valor-total");

if(campo){
campo.innerText=total.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

}

function limparTudo(){

if(confirm("Deseja apagar todos os itens?")){

itens=[];

adicionarItem();

}

}

function salvarEVisualizar(){

const cliente=document.getElementById("cliente-nome").value||"Cliente Não Informado";

const data=document.getElementById("orcamento-data").value;

const orcamentoFinal={

cliente:cliente,
data:data,
itens:itens,
total:itens.reduce((acc,i)=>acc+(i.qtd*i.valorUnit),0),
modulo:"Manual"

};

localStorage.setItem("orcamento_pro_final",JSON.stringify(orcamentoFinal));

window.location.href="visualizacao.html";

}

</script>

</body>
</html>
